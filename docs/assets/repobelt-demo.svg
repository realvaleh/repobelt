<svg width="980" height="560" viewBox="0 0 980 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">RepoBelt terminal demo</title>
  <desc id="desc">A terminal-style demo showing RepoBelt failing a pull request because it touched a protected .env file, a risky auth file, and suspicious secrets.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="980" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111f"/>
      <stop offset="0.55" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#17121f"/>
    </linearGradient>
    <linearGradient id="card" x1="36" y1="52" x2="944" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111827"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="980" height="560" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, &quot;Liberation Mono&quot;, monospace; }
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif; }
      .muted { fill: #94a3b8; }
      .text { fill: #e5e7eb; }
      .green { fill: #34d399; }
      .red { fill: #fb7185; }
      .yellow { fill: #fbbf24; }
      .cyan { fill: #38bdf8; }
      .purple { fill: #c084fc; }
    </style>
  </defs>

  <rect width="980" height="560" rx="28" fill="url(#bg)"/>
  <circle cx="820" cy="84" r="180" fill="#2563eb" opacity="0.10"/>
  <circle cx="124" cy="444" r="170" fill="#22c55e" opacity="0.08"/>

  <g filter="url(#shadow)">
    <rect x="36" y="52" width="908" height="468" rx="22" fill="url(#card)" stroke="#334155"/>
    <rect x="36" y="52" width="908" height="54" rx="22" fill="#0b1220"/>
    <circle cx="70" cy="79" r="7" fill="#fb7185"/>
    <circle cx="94" cy="79" r="7" fill="#fbbf24"/>
    <circle cx="118" cy="79" r="7" fill="#34d399"/>
    <text x="490" y="84" text-anchor="middle" class="sans muted" font-size="14" font-weight="600">RepoBelt — AI PR safety check</text>

    <text x="64" y="145" class="mono green" font-size="18">$</text>
    <text x="88" y="145" class="mono text" font-size="18">npx repobelt check --base HEAD --head worktree --format markdown</text>

    <text x="64" y="194" class="mono cyan" font-size="20" font-weight="700"># RepoBelt Report</text>
    <text x="64" y="230" class="mono text" font-size="18">Status: </text>
    <rect x="153" y="209" width="74" height="28" rx="7" fill="#7f1d1d" stroke="#fb7185" opacity="0.95"/>
    <text x="171" y="230" class="mono red" font-size="18" font-weight="700">FAIL</text>

    <text x="64" y="269" class="mono muted" font-size="17">Changed files: 3</text>

    <text x="64" y="318" class="mono red" font-size="18" font-weight="700">Blocked files</text>
    <text x="88" y="351" class="mono text" font-size="17">• </text>
    <text x="112" y="351" class="mono red" font-size="17">.env</text>
    <text x="164" y="351" class="mono muted" font-size="17"> matched .env</text>

    <text x="64" y="398" class="mono yellow" font-size="18" font-weight="700">Risky files</text>
    <text x="88" y="431" class="mono text" font-size="17">• </text>
    <text x="112" y="431" class="mono yellow" font-size="17">auth/login.ts</text>
    <text x="250" y="431" class="mono muted" font-size="17"> matched auth/** and requires review</text>

    <text x="515" y="318" class="mono purple" font-size="18" font-weight="700">Secret findings</text>
    <text x="539" y="351" class="mono text" font-size="17">• </text>
    <text x="563" y="351" class="mono purple" font-size="17">.env:1</text>
    <text x="635" y="351" class="mono muted" font-size="17"> high entropy env assignment</text>
    <text x="539" y="384" class="mono text" font-size="17">• </text>
    <text x="563" y="384" class="mono purple" font-size="17">src/config.ts:1</text>
    <text x="716" y="384" class="mono muted" font-size="17"> GitHub token pattern</text>

    <rect x="64" y="462" width="852" height="34" rx="10" fill="#111827" stroke="#334155"/>
    <text x="84" y="484" class="mono text" font-size="15">Reviewer action: </text>
    <text x="229" y="484" class="mono red" font-size="15" font-weight="700">Do not merge</text>
    <text x="342" y="484" class="mono muted" font-size="15"> until blocked findings are resolved.</text>
  </g>
</svg>
