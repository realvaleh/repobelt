name: Bug report
description: Report something that is not working as expected.
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a RepoBelt bug. Please do not include secrets, tokens, private keys, or private repository contents. Redact sensitive values as `[REDACTED]`.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: RepoBelt failed/passed/warned unexpectedly when...
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps or commands that reproduce the issue.
      placeholder: |
        1. Create .repobelt.yml with...
        2. Run `npx repobelt check --base HEAD --head worktree`
        3. Observe...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should RepoBelt have done?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What did RepoBelt do instead? Paste output only after redacting secrets.
      render: text
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: RepoBelt version
      placeholder: "0.1.0"
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: "node --version"
  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Local CLI
        - GitHub Actions
        - Both
        - Other
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: I have redacted secrets, tokens, keys, credentials, and private repository content.
          required: true
